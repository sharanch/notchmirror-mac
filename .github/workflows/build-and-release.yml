name: Build & Release DMG

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build, Package & Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Select Xcode ───────────────────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ── 3. Derive version from tag or commit ──────────────────────
      - name: Set release version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            MARKETING_VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
            MARKETING_VERSION="0.0.0"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> $GITHUB_OUTPUT
          echo "DMG_ASSET=NotchThing-${VERSION}.dmg" >> $GITHUB_OUTPUT

      # ── 4. Build archive (unsigned) ───────────────────────────────
      - name: Build Xcode archive
        run: |
          xcodebuild archive \
            -project NotchThing.xcodeproj \
            -scheme NotchThing \
            -configuration Release \
            -archivePath $RUNNER_TEMP/NotchThing.xcarchive \
            MARKETING_VERSION=${{ steps.version.outputs.MARKETING_VERSION }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── 5. Export .app ────────────────────────────────────────────
      - name: Export .app
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>mac-application</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>-</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/NotchThing.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # ── 6. Strip quarantine & fix permissions ─────────────────────
      # Without this, macOS shows "damaged and can't be opened" because
      # files downloaded from the internet get a com.apple.quarantine
      # extended attribute that Gatekeeper rejects on unsigned apps.
      - name: Strip extended attributes
        run: |
          APP_PATH="$RUNNER_TEMP/export/NotchThing.app"
          xattr -cr "$APP_PATH"
          chmod -R a+x "$APP_PATH/Contents/MacOS/"

      # ── 7. Package as DMG ─────────────────────────────────────────
      - name: Create DMG
        run: |
          APP_PATH="$RUNNER_TEMP/export/NotchThing.app"
          DMG_STAGING="$RUNNER_TEMP/dmg-staging"

          mkdir -p "$DMG_STAGING"
          cp -R "$APP_PATH" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          hdiutil create \
            -volname "NotchThing" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            "$RUNNER_TEMP/NotchThing.dmg"

      # ── 8. Rename DMG to include version ─────────────────────────
      - name: Rename DMG
        run: |
          mv "$RUNNER_TEMP/NotchThing.dmg" \
             "$RUNNER_TEMP/${{ steps.version.outputs.DMG_ASSET }}"

      # ── 9. Create GitHub Release & upload DMG ─────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "NotchThing ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          body: |
            ## NotchThing ${{ steps.version.outputs.VERSION }}

            ### Install
            1. Download **${{ steps.version.outputs.DMG_ASSET }}** below
            2. Open the DMG and drag **NotchThing** to your Applications folder
            3. Open Terminal and run:
            ```
            xattr -cr /Applications/NotchThing.app #or 
            xattr -c /Applications/NotchThing.app
            ```
            4. Launch NotchThing from Applications or Spotlight

            > **Why step 3?** Apple requires a paid Developer account to notarize apps.
            > Without it, macOS blocks apps downloaded from the internet.
            > The command above removes that block — it's safe to run.
          files: ${{ runner.temp }}/${{ steps.version.outputs.DMG_ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}